services:
  db:
    image: postgres:16-alpine
    container_name: financenan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: financenan
      POSTGRES_PASSWORD: financenan
      POSTGRES_DB: financenan
    ports:
      - "5432:5432"
    volumes:
      - financenan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financenan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  financenan_pgdata:
